<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Enora Minot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; cursor: none; overflow: hidden; height: 100dvh; background: var(--bg); transition: background .4s; }

    :root {
      --bg:     #0c0b10;
      --fg:     #ffffff;
      --fg-dim: rgba(255,255,255,.55);
      --fg-mute:rgba(255,255,255,.25);
      --accent: #a8ff78;
    }
    [data-theme="light"] {
      --bg:     #f0ede8;
      --fg:     #0f0e0d;
      --fg-dim: rgba(15,14,13,.55);
      --fg-mute:rgba(15,14,13,.30);
    }
    [data-theme="dark"] { --fg-dim: rgba(255,255,255,.82); --fg-mute: rgba(255,255,255,.48); }

    /* ── Cursor ──────────────────────────────────────── */
    #cursor-dot, #cursor-ring {
      position: fixed; top: 0; left: 0; pointer-events: none;
      z-index: 9999; transform: translate(-50%,-50%); border-radius: 50%;
    }
    #cursor-dot { width: 5px; height: 5px; background: var(--fg); }
    #cursor-ring { width: 32px; height: 32px; border: 1.5px solid var(--fg-dim); transition: width .22s, height .22s; }
    #cursor-ring.hovering { width: 48px; height: 48px; animation: halo 1.2s linear infinite; }
    @keyframes halo {
      0%,100% { border-color: hsl(0,100%,65%);   box-shadow: 0 0 12px 2px hsl(0,100%,65%); }
      25%      { border-color: hsl(90,100%,55%);  box-shadow: 0 0 12px 2px hsl(90,100%,55%); }
      50%      { border-color: hsl(200,100%,60%); box-shadow: 0 0 12px 2px hsl(200,100%,60%); }
      75%      { border-color: hsl(270,100%,70%); box-shadow: 0 0 12px 2px hsl(270,100%,70%); }
    }

    /* ── Halftone canvas ─────────────────────────────── */
    #halftone-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

    /* ── Top bar ─────────────────────────────────────── */
    #top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 28px 40px; }
    .top-left { display: flex; }
    .brand { font-family: 'DM Mono', monospace; font-size: .88rem; color: var(--fg); text-decoration: none; }
    .brand span { color: var(--accent); }
    .top-nav { display: flex; gap: 26px; list-style: none; justify-content: center; }
    .top-nav a { font-size: .78rem; letter-spacing: .07em; text-transform: uppercase; color: var(--fg-dim); text-decoration: none; transition: color .2s; }
    .top-nav a:hover, .top-nav a.active { color: var(--fg); }
    .top-nav a.active { font-weight: 600; position: relative; }
    .top-nav a.active::after { content: ''; position: absolute; bottom: -5px; left: 0; right: 0; height: 1.5px; background: var(--fg); border-radius: 2px; }
    .top-right { display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
    .ctrl-btn { width: 30px; height: 30px; background: transparent; border: none; cursor: none; display: flex; align-items: center; justify-content: center; color: var(--fg-dim); border-radius: 6px; transition: color .2s, background .2s; }
    .ctrl-btn:hover, .ctrl-btn.active { color: var(--fg); background: rgba(128,128,128,.15); }
    .ctrl-sep { width: 1px; height: 16px; background: var(--fg-mute); margin: 0 6px; }

    /* ── Contact content ─────────────────────────────── */
    #contact-section {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center;
      padding: 0 8vw; pointer-events: none;
    }
    .contact-block { pointer-events: auto; }
    .contact-label {
      font-family: 'DM Mono', monospace; font-size: .72rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--fg-dim); margin-bottom: 24px;
      display: block; font-weight: 700;
    }
    .contact-title {
      font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 800; color: var(--fg);
      letter-spacing: -.035em; line-height: 1.04; margin-bottom: 40px;
    }
    .contact-title em { font-style: normal; color: transparent; -webkit-text-stroke: 1.5px var(--fg); }
    .contact-links { display: flex; flex-direction: column; gap: 18px; }
    .contact-row {
      display: flex; align-items: baseline; gap: 18px;
    }
    .contact-type {
      font-family: 'DM Mono', monospace; font-size: .64rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--fg-mute); min-width: 70px;
    }
    .contact-val {
      font-size: 1.05rem; font-weight: 700; color: var(--fg);
      text-decoration: none; border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    .contact-val:hover { border-color: var(--fg); }

    .page-hint {
      position: fixed; bottom: 60px; right: 40px; z-index: 20;
      font-family: 'DM Mono', monospace; font-size: .64rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--fg); font-weight: 700;
    }

    /* ── Mobile nav overlay ──────────────────────────── */
    .mob-btn { display: none; }
    .mob-nav {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: var(--bg); flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .mob-nav.open { display: flex; }
    .mob-nav-links { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .mob-nav-links a {
      font-size: clamp(2rem, 9vw, 2.8rem); font-weight: 800; color: var(--fg);
      text-decoration: none; letter-spacing: -.03em; padding: 8px 0; transition: color .2s;
    }
    .mob-nav-close {
      position: absolute; top: 18px; right: 18px; background: transparent;
      border: none; color: var(--fg); width: 40px; height: 40px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 8px;
    }
    .mob-theme { display: flex; gap: 4px; margin: 0 0 36px; border: 1px solid var(--border); border-radius: 40px; padding: 4px; }
    .mob-theme .ctrl-btn { cursor: pointer; border-radius: 40px; padding: 8px 18px; width: auto; height: auto; color: var(--fg-mute); }
    .mob-theme .ctrl-btn.active { background: var(--fg); color: var(--bg); }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 680px) {
      #top-bar { padding: 18px 20px; }
      .top-nav { display: none; }
      .top-right .theme-btn, .ctrl-sep { display: none; }
      .mob-btn { display: flex !important; }
      #contact-section { padding: 0 6vw; align-items: flex-start; padding-top: 110px; }
      .contact-title { font-size: clamp(1.8rem, 7vw, 3rem); margin-bottom: 28px; }
      .page-hint { right: 20px; bottom: 60px; font-size: .58rem; }
    }
    @media (hover: none) and (pointer: coarse) {
      #cursor-dot, #cursor-ring { display: none !important; }
      body { cursor: auto; }
      a, button { cursor: pointer; }
    }

    /* ── Site footer ─────────────────────────────────── */
    .site-footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
      height: 44px; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: .66rem;
      color: var(--fg-mute); letter-spacing: .06em;
      transition: background .4s, border-color .4s;
    }
    .site-footer a { color: inherit; text-decoration: none; transition: color .2s; }
    .site-footer a:hover { color: var(--fg); }
    .site-footer nav { display: flex; gap: 20px; }
    @media (max-width: 600px) {
      .site-footer { padding: 0 20px; }
      .site-footer nav { gap: 14px; font-size: .6rem; }
    }
  </style>
</head>
<body>

  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <canvas id="halftone-canvas"></canvas>

  <header id="top-bar">
    <div class="top-left"><a href="index.html" class="brand">Enora Minot</a></div>
    <ul class="top-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <div class="top-right">
      <button class="ctrl-btn theme-btn" data-theme-val="light" aria-label="Light mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn theme-btn" data-theme-val="dark" aria-label="Dark mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="ctrl-btn mob-btn" id="mob-open" aria-label="Open menu">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile nav overlay -->
  <div class="mob-nav" id="mob-nav">
    <button class="mob-nav-close" id="mob-close" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="mob-theme">
      <button class="ctrl-btn theme-btn" data-theme-val="light" aria-label="Light mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="ctrl-btn theme-btn" data-theme-val="dark" aria-label="Dark mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <div class="mob-nav-links">
      <a href="index.html">Home</a>
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <section id="contact-section">
    <div class="contact-block">
      <span class="contact-label">Get in touch</span>
      <h1 class="contact-title">Let's make<br>something <em>together</em></h1>
      <div class="contact-links">
        <div class="contact-row">
          <span class="contact-type">Email</span>
          <a href="mailto:minotenora@gmail.com" class="contact-val">minotenora@gmail.com</a>
        </div>
        <div class="contact-row">
          <span class="contact-type">LinkedIn</span>
          <a href="https://www.linkedin.com/in/enora-minot/" target="_blank" rel="noopener" class="contact-val">linkedin.com/in/enora-minot</a>
        </div>
      </div>
    </div>
  </section>

  <span class="page-hint">Move to Interact</span>

  <footer class="site-footer">
    <span>© 2026 Enora Minot</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>

  <script>
    /* ── Cursor ─────────────────────────────────────── */
    const cDot = document.getElementById('cursor-dot');
    const cRing = document.getElementById('cursor-ring');
    let mx = -200, my = -200, rx = -200, ry = -200;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function tick() {
      rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
      cDot.style.left = mx+'px'; cDot.style.top = my+'px';
      cRing.style.left = rx+'px'; cRing.style.top = ry+'px';
      requestAnimationFrame(tick);
    })();
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => cRing.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cRing.classList.remove('hovering'));
    });

    /* ── Theme ──────────────────────────────────────── */
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.themeVal === saved);
      btn.addEventListener('click', () => {
        const v = btn.dataset.themeVal;
        html.setAttribute('data-theme', v); localStorage.setItem('theme', v);
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.themeVal === v));
        document.getElementById('mob-nav').classList.remove('open');
      });
    });

    /* ── Halftone dot-matrix (Canvas 2D) ────────────── */
    (function () {
      const canvas = document.getElementById('halftone-canvas');
      const ctx = canvas.getContext('2d');
      const COLS = 44;
      let W, H, CELL, ROWS;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        CELL = W / COLS; ROWS = Math.ceil(H / CELL) + 1;
      }
      resize();
      window.addEventListener('resize', resize);

      function hash(x, y) { const s = Math.sin(x*127.1 + y*311.7)*43758.5453; return s - Math.floor(s); }
      function vnoise(x, y) {
        const ix = Math.floor(x), iy = Math.floor(y);
        const fx = x-ix, fy = y-iy;
        const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
        return hash(ix,iy)*(1-ux)*(1-uy) + hash(ix+1,iy)*ux*(1-uy) + hash(ix,iy+1)*(1-ux)*uy + hash(ix+1,iy+1)*ux*uy;
      }
      function fbm(x, y, z) { return vnoise(x+z*1.7, y+z*2.3)*0.6 + vnoise(x*2.1+z*0.8, y*2.1+z*1.1)*0.4; }

      let tX=0.5, tY=0.5, cX=0.5, cY=0.5, lrX=-1, lrY=-1, tScr=0, cScr=0;
      const rips = [];

      document.addEventListener('mousemove', e => { tX=e.clientX/W; tY=e.clientY/H; });

      /* Touch interaction for halftone */
      document.addEventListener('touchmove', e => {
        tX = e.touches[0].clientX / W;
        tY = e.touches[0].clientY / H;
      }, { passive: true });
      document.addEventListener('touchstart', e => {
        tX = e.touches[0].clientX / W;
        tY = e.touches[0].clientY / H;
        rips.push({ x: tX, y: tY, t: (performance.now() - t0) / 1000 });
        if (rips.length > 8) rips.shift();
      }, { passive: true });

      const t0 = performance.now();
      (function frame() {
        requestAnimationFrame(frame);
        const t = (performance.now()-t0)/1000;
        const asp = W/H;
        cX += (tX-cX)*0.10; cY += (tY-cY)*0.10; cScr += (tScr-cScr)*0.04;

        const ddx=cX-lrX, ddy=cY-lrY;
        if (ddx*ddx+ddy*ddy > 0.0014) { rips.push({x:cX,y:cY,t}); if(rips.length>8) rips.shift(); lrX=cX; lrY=cY; }

        ctx.clearRect(0, 0, W, H);
        const CR = 0.30;

        for (let col=0; col<COLS; col++) {
          for (let row=0; row<ROWS; row++) {
            const uvx=(col+0.5)/COLS, uvy=(row+0.5)/ROWS;
            const cdx=(uvx-cX)*asp, cdy=uvy-cY;
            const cd=Math.sqrt(cdx*cdx+cdy*cdy);
            const cAng=Math.atan2(cdy,cdx);
            const push=Math.pow(Math.max(0,1-cd/CR),2)*0.24;

            let rDX=0, rDY=0, rG=0;
            for (let i=0; i<rips.length; i++) {
              const rip=rips[i], el=t-rip.t;
              if (el<0||el>2.5) continue;
              const rdx=(uvx-rip.x)*asp, rdy=uvy-rip.y;
              const rd=Math.sqrt(rdx*rdx+rdy*rdy);
              const rA=Math.atan2(rdy,rdx);
              const sig=rd-el*0.50, dec=Math.exp(-el*0.9);
              rDX += Math.cos(rA)*sig*Math.exp(-sig*sig*55)*dec*0.18;
              rDY += Math.sin(rA)*sig*Math.exp(-sig*sig*55)*dec*0.18;
              rG  += Math.exp(-sig*sig*85)*dec;
            }
            rG = Math.min(rG, 1.0);

            const px=(uvx+Math.cos(cAng)*push+rDX)*W;
            const py=(uvy+Math.sin(cAng)*push+rDY)*H;
            const n=fbm(col*0.07, row*0.07, t*0.20+cScr*1.8);

            const reveal=Math.min(1,Math.max(0,(cd-0.04)/0.14));
            const crI=Math.min(1,cd/(CR*0.55));
            const crO=Math.max(0,1-cd/CR);
            const ring=crI*crO;

            /* Centre-left mask preserves contact text area */
            const cendx=(uvx-0.28)*asp, cendy=uvy-0.5;
            const cMask=Math.min(1,Math.max(0,(Math.sqrt(cendx*cendx+cendy*cendy)-0.10)/0.16));

            let r=(0.14+n*0.20+ring*0.38+rG*0.28)*CELL*0.5;
            r=Math.min(r,CELL*0.46)*cMask;

            const alpha=(0.30+ring*0.62+rG*0.55+n*0.09)*reveal*cMask;
            if (alpha<0.012||r<0.7) continue;

            const warm=Math.min(1,ring*0.9+rG*0.5);
            const R=Math.round(200+warm*55), G=Math.round(232-warm*10), B=Math.round(255-warm*40);

            const glow=(ring+rG)*6;
            ctx.shadowBlur  = glow>0.5 ? glow : 0;
            ctx.shadowColor = `rgba(${R},${G},${B},0.55)`;
            ctx.globalAlpha = alpha;
            ctx.fillStyle   = `rgb(${R},${G},${B})`;
            ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
          }
        }
        ctx.globalAlpha=1; ctx.shadowBlur=0;
      })();
    })();

    /* ── Mobile nav ──────────────────────────────────── */
    document.getElementById('mob-open').addEventListener('click', () => document.getElementById('mob-nav').classList.add('open'));
    document.getElementById('mob-close').addEventListener('click', () => document.getElementById('mob-nav').classList.remove('open'));
    document.querySelectorAll('.mob-nav-links a').forEach(a => a.addEventListener('click', () => document.getElementById('mob-nav').classList.remove('open')));
  </script>
</body>
</html>
