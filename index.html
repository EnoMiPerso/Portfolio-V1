<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enora Minot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      cursor: none;
      overflow: hidden;
      height: 100dvh;
      background: var(--bg);
      transition: background .4s;
    }

    /* ─── Theme tokens ───────────────────────────────────────── */
    :root {
      --bg:      #0c0b10;
      --fg:      #ffffff;
      --fg-dim:  rgba(255,255,255,0.55);
      --fg-mute: rgba(255,255,255,0.25);
      --accent:  #a8ff78;
    }
    [data-theme="light"] {
      --bg:      #f0ede8;
      --fg:      #0f0e0d;
      --fg-dim:  rgba(15,14,13,0.55);
      --fg-mute: rgba(15,14,13,0.30);
    }

    /* ─── Custom cursor — pencil ─────────────────────────────── */
    #cursor-dot {
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      width: 4px; height: 4px;
      background: var(--fg); border-radius: 50%;
      transform: translate(-50%,-50%);
    }
    #cursor-pencil {
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9998;
      color: var(--fg);
      opacity: 0.75;
      transition: opacity .2s, filter .2s;
    }
    #cursor-pencil.hovering { opacity: 0.4; }
    #cursor-pencil.drawing  {
      opacity: 1;
      filter: drop-shadow(0 0 5px var(--fg));
    }


    /* ─── Drawing canvas ─────────────────────────────────────── */
    #draw-canvas {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
      width: 100%; height: 100%;
    }

    /* ─── Top bar ────────────────────────────────────────────── */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 28px 40px;
    }

    .top-left {
      display: flex; align-items: center; gap: 10px;
    }

    .brand {
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem; letter-spacing: -0.01em;
      color: var(--fg); text-decoration: none;
    }
    .brand span { color: var(--accent); }

    .top-right {
      display: flex; align-items: center; justify-content: flex-end; gap: 4px;
    }

    .top-nav {
      display: flex; gap: 26px; list-style: none;
      justify-content: center;
    }
    .top-nav a {
      font-size: 0.78rem; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--fg-dim); text-decoration: none;
      transition: color .2s;
    }
    .top-nav a:hover { color: var(--fg); }

    /* Controls strip */
    .ctrl-strip {
      display: flex; align-items: center; gap: 4px;
    }
    .ctrl-sep {
      width: 1px; height: 16px; background: var(--fg-mute); margin: 0 6px;
    }
    .ctrl-btn {
      width: 30px; height: 30px;
      background: transparent; border: none; cursor: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--fg-dim); border-radius: 6px;
      transition: color .2s, background .2s;
    }
    .ctrl-btn:hover, .ctrl-btn.active { color: var(--fg); background: rgba(255,255,255,0.12); }

    [data-theme="dark"] {
      --fg-dim:  rgba(255,255,255,0.82);
      --fg-mute: rgba(255,255,255,0.48);
    }

    /* Active nav link */
    .top-nav a.active {
      color: var(--fg); font-weight: 600;
      position: relative;
    }
    .top-nav a.active::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 0; right: 0;
      height: 1.5px;
      background: var(--fg);
      border-radius: 2px;
    }

    /* ─── Hero ───────────────────────────────────────────────── */
    #hero {
      position: fixed; inset: 0; z-index: 20;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 0 24px; gap: 0;
    }

    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.74rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--fg); font-weight: 700;
      margin-bottom: 52px;
      animation: fadeUp .8s ease both;
    }
    .hero-title {
      font-size: clamp(2rem, 5.5vw, 4.5rem);
      font-weight: 800; line-height: 1.1; letter-spacing: -.03em;
      color: var(--fg);
      animation: fadeUp .9s .1s ease both;
    }
    .hero-title em {
      font-style: normal;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--fg);
    }

    .page-hint {
      position: fixed; bottom: 60px; right: 40px; z-index: 20;
      font-family: 'DM Mono', monospace; font-size: .64rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--fg); font-weight: 700;
      animation: fadeUp 1s .6s ease both;
      transition: opacity 1.2s ease;
    }
    .page-hint.gone { opacity: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ─── Mobile nav overlay ────────────────────────── */
    .mob-btn { display: none; }
    .mob-nav {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: var(--bg); flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .mob-nav.open { display: flex; }
    .mob-nav-links { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .mob-nav-links a {
      font-size: clamp(2rem, 9vw, 2.8rem); font-weight: 800; color: var(--fg);
      text-decoration: none; letter-spacing: -.03em; padding: 8px 0;
      transition: color .2s;
    }
    .mob-nav-links a:hover { color: var(--fg-dim); }
    .mob-nav-close {
      position: absolute; top: 18px; right: 18px; background: transparent;
      border: none; color: var(--fg); width: 40px; height: 40px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }
    .mob-theme { display: flex; gap: 4px; margin: 0 0 36px; border: 1px solid var(--border); border-radius: 40px; padding: 4px; }
    .mob-theme .ctrl-btn { cursor: pointer; border-radius: 40px; padding: 8px 18px; width: auto; height: auto; color: var(--fg-mute); }
    .mob-theme .ctrl-btn.active { background: var(--fg); color: var(--bg); }

    /* ─── Responsive ────────────────────────────────── */
    @media (max-width: 680px) {
      #top-bar { padding: 18px 20px; }
      .top-nav { display: none; }
      .top-right .theme-btn, .ctrl-sep { display: none; }
      .mob-btn { display: flex !important; }
      .page-hint { right: 20px; bottom: 60px; font-size: .58rem; }
    }
    @media (hover: none) and (pointer: coarse) {
      #cursor-dot, #cursor-pencil { display: none !important; }
      body { cursor: auto; }
      a, button { cursor: pointer; }
    }

    /* ── Site footer ─────────────────────────────────── */
    .site-footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
      height: 44px; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: .66rem;
      color: var(--fg-mute); letter-spacing: .06em;
      transition: background .4s, border-color .4s;
    }
    .site-footer a { color: inherit; text-decoration: none; transition: color .2s; }
    .site-footer a:hover { color: var(--fg); }
    .site-footer nav { display: flex; gap: 20px; }
    @media (max-width: 600px) {
      .site-footer { padding: 0 20px; }
      .site-footer nav { gap: 14px; font-size: .6rem; }
    }
  </style>
</head>
<body>

  <!-- ── Custom cursor ─────────────────────────── -->
  <div id="cursor-dot"></div>
  <div id="cursor-pencil">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
    </svg>
  </div>

  <!-- ── Mobile nav overlay ──────────────────────── -->
  <div class="mob-nav" id="mob-nav">
    <button class="mob-nav-close" id="mob-close" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="mob-theme">
      <button class="ctrl-btn theme-btn" data-theme-val="light" aria-label="Light mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="ctrl-btn theme-btn" data-theme-val="dark" aria-label="Dark mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <div class="mob-nav-links">
      <a href="/">Home</a>
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <!-- ── Drawing canvas ────────────────────────── -->
  <canvas id="draw-canvas"></canvas>
  <span class="page-hint" id="draw-hint">Draw Freely</span>

  <!-- ── Top bar ───────────────────────────────── -->
  <header id="top-bar">

    <!-- Left: brand + theme toggle -->
    <div class="top-left">
      <a href="/" class="brand">Enora Minot</a>
    </div>

    <!-- Centre: nav -->
    <ul class="top-nav">
      <li><a href="/" class="active">Home</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="top-right">
      <button class="ctrl-btn theme-btn" data-theme-val="light" aria-label="Light mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn theme-btn" data-theme-val="dark" aria-label="Dark mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="ctrl-btn mob-btn" id="mob-open" aria-label="Open menu">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

  </header>

  <!-- ── Hero ──────────────────────────────────── -->
  <section id="hero">
    <p class="hero-label">Lead Product Designer &amp; Researcher</p>
    <h1 class="hero-title">I design things the world<br />doesn't know it <em>needs yet</em></h1>
  </section>

  <footer class="site-footer">
    <span>© 2026 Enora Minot</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>

  <script>
    /* ── Cursor (pencil) ─────────────────────────────────────── */
    const cDot    = document.getElementById('cursor-dot');
    const cPencil = document.getElementById('cursor-pencil');
    let mx = -200, my = -200, rx = -200, ry = -200;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    (function cursorTick() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      cDot.style.left    = mx + 'px';       cDot.style.top    = my + 'px';
      /* offset so pencil tip (bottom-left of icon) sits at cursor */
      cPencil.style.left = (rx - 2) + 'px'; cPencil.style.top = (ry - 20) + 'px';
      requestAnimationFrame(cursorTick);
    })();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cPencil.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cPencil.classList.remove('hovering'));
    });

    /* ── Theme toggle ────────────────────────────────────────── */
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.themeVal === savedTheme);
      btn.addEventListener('click', () => {
        const val = btn.dataset.themeVal;
        html.setAttribute('data-theme', val);
        localStorage.setItem('theme', val);
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.themeVal === val));
        document.getElementById('mob-nav').classList.remove('open');
      });
    });

    /* ── Drawing system ──────────────────────────────────────── */
    const dc     = document.getElementById('draw-canvas');
    const ctx    = dc.getContext('2d');
    const hint   = document.getElementById('draw-hint');
    let   W, H;

    function resizeDC() {
      W = dc.width  = window.innerWidth;
      H = dc.height = window.innerHeight;
    }
    resizeDC();
    window.addEventListener('resize', resizeDC);

    const FADE_MS   = 30000;  /* stroke lifetime: 30 s */
    const MAX_STRK  = 40;     /* max concurrent strokes */
    const strokes   = [];
    let   drawing   = false;
    let   curStroke = null;
    let   hintGone  = false;

    function newStroke(x, y) {
      const s = { pts: [{ x, y }], born: performance.now(),
                  dark: html.getAttribute('data-theme') === 'dark' };
      strokes.push(s);
      if (strokes.length > MAX_STRK) strokes.shift();
      return s;
    }

    document.addEventListener('mousedown', e => {
      if (e.target.closest('header')) return;
      drawing   = true;
      curStroke = newStroke(e.clientX, e.clientY);
      cPencil.classList.add('drawing');
      if (!hintGone) { hintGone = true; hint.classList.add('gone'); } // fades out on first draw
    });

    document.addEventListener('mousemove', e => {
      if (!drawing || !curStroke) return;
      const last = curStroke.pts.at(-1);
      if (Math.hypot(e.clientX - last.x, e.clientY - last.y) < 3) return;
      curStroke.pts.push({ x: e.clientX, y: e.clientY });
    });

    document.addEventListener('mouseup', () => {
      drawing = false; curStroke = null;
      cPencil.classList.remove('drawing');
    });

    /* Touch drawing */
    document.addEventListener('touchstart', e => {
      if (e.target.closest('header, .mob-nav')) return;
      const t = e.touches[0];
      drawing = true;
      curStroke = newStroke(t.clientX, t.clientY);
      if (!hintGone) { hintGone = true; hint.classList.add('gone'); }
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (!drawing || !curStroke) return;
      const t = e.touches[0];
      const last = curStroke.pts.at(-1);
      if (Math.hypot(t.clientX - last.x, t.clientY - last.y) < 3) return;
      curStroke.pts.push({ x: t.clientX, y: t.clientY });
    }, { passive: true });
    document.addEventListener('touchend', () => { drawing = false; curStroke = null; }, { passive: true });

    /* Mobile nav */
    document.getElementById('mob-open').addEventListener('click', () => document.getElementById('mob-nav').classList.add('open'));
    document.getElementById('mob-close').addEventListener('click', () => document.getElementById('mob-nav').classList.remove('open'));
    document.querySelectorAll('.mob-nav-links a').forEach(a => a.addEventListener('click', () => document.getElementById('mob-nav').classList.remove('open')));

    /* Double-click anywhere on canvas clears all strokes */
    document.addEventListener('dblclick', e => {
      if (e.target.closest('header')) return;
      strokes.length = 0;
    });

    /* ── Render loop ─────────────────────────────────────────── */
    (function render() {
      requestAnimationFrame(render);
      ctx.clearRect(0, 0, W, H);

      const now = performance.now();

      for (let i = strokes.length - 1; i >= 0; i--) {
        const s   = strokes[i];
        const age = now - s.born;
        if (age > FADE_MS + 400) { strokes.splice(i, 1); continue; }

        const t     = Math.max(0, 1 - age / FADE_MS);
        const alpha = Math.pow(t, 1.3) * 0.88;
        if (alpha < 0.01 || s.pts.length < 2) continue;

        ctx.lineWidth  = 3.5;
        ctx.lineCap    = 'round';
        ctx.lineJoin   = 'round';

        if (s.dark) {
          ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
          ctx.shadowBlur  = 16;
          ctx.shadowColor = `rgba(255,255,255,${alpha * 0.40})`;
        } else {
          ctx.strokeStyle = `rgba(12,12,12,${alpha * 0.72})`;
          ctx.shadowBlur  = 0;
        }

        /* Smooth bezier through midpoints */
        ctx.beginPath();
        ctx.moveTo(s.pts[0].x, s.pts[0].y);
        for (let j = 1; j < s.pts.length - 1; j++) {
          const mx2 = (s.pts[j].x + s.pts[j + 1].x) * 0.5;
          const my2 = (s.pts[j].y + s.pts[j + 1].y) * 0.5;
          ctx.quadraticCurveTo(s.pts[j].x, s.pts[j].y, mx2, my2);
        }
        ctx.lineTo(s.pts.at(-1).x, s.pts.at(-1).y);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
    })();

    /*
     * NOTE FOR WORK PAGE:
     * The halftone dot-matrix effect (displacement void + blurry ring + ripple)
     * built with Canvas 2D is preserved in git history and should be used as
     * the interactive background on the /work project cards page.
     */
  </script>
</body>
</html>
